<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropShift - Document Scanner</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .split-divider {
            width: 6px;
            cursor: col-resize;
            background: #333;
            position: relative;
            z-index: 15;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .split-divider:hover, .split-divider.is-active {
            background: #1473e6;
        }
        .split-divider .grip {
            width: 2px;
            height: 32px;
            border-left: 1px solid rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.2);
        }
        .split-divider:hover .grip, .split-divider.is-active .grip {
            border-color: rgba(255,255,255,0.5);
        }
        body.is-resizing * {
            cursor: col-resize !important;
            user-select: none !important;
        }
        .is-dragging {
            border-color: #1473e6 !important;
            background-color: rgba(20, 115, 230, 0.1) !important;
        }
        #sourceCanvas {
            cursor: crosshair;
            touch-action: none;
        }
        #qualityInput::-webkit-outer-spin-button,
        #qualityInput::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #qualityInput[type=number] {
            appearance: textfield;
            -moz-appearance: textfield;
        }
    </style>
</head>
<body data-tool="scanner">

<!-- Top Navigation -->
<nav>
    <div>
        <a class="brand-logo" href="./" aria-label="CropShift home">
            <img src="logo.svg" alt="" aria-hidden="true">
            <span>CropShift</span>
        </a>
        <div class="h-5"></div>
        <span>Document Scanner</span>
    </div>
    <div id="scannerNav">
        <div class="top-controls flex items-center gap-2">
            <div id="cornerModeGroup" role="group" aria-label="Corner Mode">
                <button type="button" data-mode="4" aria-pressed="true" class="mode-btn">4 Corners</button>
                <button type="button" data-mode="8" aria-pressed="false" class="mode-btn">8 Corners</button>
            </div>

            <div class="workspace-status flex items-center gap-2">
                <span id="engineStatus">Ready</span>
                <p id="statusMessage" role="status" aria-live="polite">Load an image</p>
            </div>
            <button id="rotateButton" disabled class="action-btn">
                <span class="material-symbols-outlined">rotate_right</span> Rotate
            </button>
            <button id="resetButton" disabled class="action-btn">
                <span class="material-symbols-outlined">refresh</span> Reset
            </button>
            <button id="fitButton" disabled class="action-btn">
                <span class="material-symbols-outlined">fit_screen</span> Fit
            </button>
            <button id="clearButton" disabled class="action-btn">
                <span class="material-symbols-outlined">delete</span> Clear
            </button>
        </div>

        <div class="h-7"></div>

        <div class="workspace-meta flex items-center gap-5">
            <div class="meta-block flex flex-col items-end">
                <span>File</span>
                <span id="fileName">None loaded</span>
            </div>
            <div class="h-7"></div>
            <div class="meta-block flex flex-col items-end">
                <span>Size</span>
                <span id="imageSize">-</span>
            </div>
            <div class="h-7"></div>
            <div class="meta-block flex flex-col items-end">
                <span>File Size</span>
                <span id="fileSizeMeta">-</span>
            </div>
            <div class="h-7"></div>
            <div class="meta-block flex flex-col items-end">
                <span>Export</span>
                <span id="selectionSize">-</span>
            </div>
        </div>
    </div>
</nav>

<!-- Shared Sidebar (rendered by shell.js, incl. scanner upload dropzone) -->
<aside id="sidebar" class="pro-scrollbar"></aside>

<!-- Main Workspace -->
<main>
  <div class="tool-screen">
    <div id="splitContainer">

        <!-- Source Pane -->
        <div id="sourcePane" style="flex-basis: 50%;">
            <div>
                <span>Source</span>
            </div>
            <div>
                <canvas id="sourceCanvas" tabindex="0" role="application" aria-label="Crop selection editor. Use the bracket keys to choose a corner and arrow keys to move it."></canvas>
                <div id="emptyState" class="absolute inset-0 m-6 border border-dashed border-zinc-700 rounded-lg flex flex-col items-center justify-center gap-2 text-zinc-500 pointer-events-none bg-zinc-900/50 backdrop-blur-sm z-20">
                    <span class="material-symbols-outlined text-4xl">document_scanner</span>
                    <strong class="text-zinc-300 font-['Manrope'] text-lg">Drop an image here</strong>
                    <span class="text-xs">Drop, paste, or click upload. Your file stays in this browser tab.</span>
                </div>
            </div>
        </div>

        <!-- Draggable Divider -->
        <div id="splitDivider" class="split-divider"><div class="grip"></div></div>

        <!-- Preview Pane -->
        <div id="previewPane" style="flex-basis: 50%;">
            <div>
                <span>Preview</span>
                <span id="previewInfo">Output</span>
            </div>
            <div>
                <canvas id="previewCanvas" role="img" aria-label="Corrected crop preview"></canvas>
                <div id="previewEmpty" class="absolute inset-0 m-6 flex items-center justify-center text-zinc-600 font-bold uppercase tracking-widest text-xs pointer-events-none z-20">
                    Waiting for image
                </div>
            </div>
            <!-- Export Controls -->
            <div class="export-bar">
                <div class="export-options">
                    <div class="flex items-center gap-2">
                        <span>Format</span>
                        <div id="formatGroup" role="group" aria-label="Export format">
                            <button type="button" data-format="image/jpeg" data-ext="jpg" aria-pressed="true" class="format-btn">JPG</button>
                            <button type="button" data-format="image/jpeg" data-ext="jpeg" aria-pressed="false" class="format-btn">JPEG</button>
                            <button type="button" data-format="image/png" data-ext="png" aria-pressed="false" class="format-btn">PNG</button>
                            <button type="button" data-format="image/webp" data-ext="webp" aria-pressed="false" class="format-btn">WEBP</button>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <label id="qualityLabel" for="qualityInput">Quality</label>
                        <div class="relative flex items-center">
                            <input id="qualityInput" type="number" min="65" max="100" value="100">
                            <span class="text-zinc-400 text-[10px] font-bold ml-1">%</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <label id="targetSizeLabel" for="targetSizeInput">Target</label>
                        <div class="relative flex items-center">
                            <input id="targetSizeInput" type="number" min="1" placeholder="Auto">
                            <span class="text-zinc-400 text-[10px] font-bold ml-1">KB</span>
                        </div>
                    </div>
                </div>

                <button id="downloadButton" disabled class="action-btn primary">
                    <span class="material-symbols-outlined">download</span> Download
                </button>
            </div>
        </div>

    </div>
  </div>
</main>

<script src="shell.js"></script>
<script src="app.js"></script>
<script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<!-- Must be defined BEFORE opencv.js loads so Emscripten picks it up -->
<script>
    var Module = {
        onRuntimeInitialized: function () {
            window.onOpenCvReady && window.onOpenCvReady();
        }
    };
</script>
<script async src="https://docs.opencv.org/4.9.0/opencv.js" onerror="window.onOpenCvFailed && window.onOpenCvFailed()" type="text/javascript"></script>

<!-- Split-pane drag logic -->
<script>
(function() {
  const divider = document.getElementById('splitDivider');
  const container = document.getElementById('splitContainer');
  const sourcePane = document.getElementById('sourcePane');
  const previewPane = document.getElementById('previewPane');
  let isDragging = false;

  divider.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    isDragging = true;
    divider.classList.add('is-active');
    document.body.classList.add('is-resizing');
    divider.setPointerCapture(e.pointerId);
  });

  divider.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    const rect = container.getBoundingClientRect();
    const offsetX = e.clientX - rect.left;
    let ratio = offsetX / rect.width;
    ratio = Math.max(0.2, Math.min(0.8, ratio));
    const sourceW = ratio * 100;
    const previewW = 100 - sourceW;
    sourcePane.style.flexBasis = sourceW + '%';
    previewPane.style.flexBasis = previewW + '%';
    if (typeof resizeCanvases === 'function') {
      resizeCanvases();
      drawSource();
      queuePreviewRender();
    }
  });

  const stopDrag = () => {
    if (!isDragging) return;
    isDragging = false;
    divider.classList.remove('is-active');
    document.body.classList.remove('is-resizing');
  };

  divider.addEventListener('pointerup', stopDrag);
  divider.addEventListener('pointercancel', stopDrag);
})();
</script>
</body>
</html>
